<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

    *{
    box-sizing:border-box;
    }

    body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    }

    /* HEADER */

    header{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:20px;
    padding:15px 25px;
    font-size:14px;
    }

    header a{
    text-decoration:none;
    color:#5f6368;
    }

    header a:hover{
    text-decoration:underline;
    }

    .apps{
    font-size:22px;
    cursor:pointer;
    }

    .profile{
    width:35px;
    height:35px;
    border-radius:50%;
    border: 1px solid #888;  
    }

    /* MAIN */

    .main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    }

    /* GOOGLE LOGO */

    .logo{
    width:272px;
    height:92px;

    background:url("https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png")
    center/contain no-repeat;

    margin-bottom:35px;
    }

    /* SEARCH */

    form{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    }

    .search{
    width:90%;
    max-width:580px;

    border:1px solid #dfe1e5;
    border-radius:24px;

    padding:10px 15px;

    display:flex;
    align-items:center;
    gap:10px;
    }

    .search:hover{
    box-shadow:0 1px 6px rgba(32,33,36,.28);
    }

    .search input{
    flex:1;
    border:none;
    outline:none;
    font-size:16px;
    }

    .icons{
    display:flex;
    gap:12px;
    color:#5f6368;
    cursor:pointer;
    }

    /* BUTTONS */

    .buttons{
    margin-top:30px;
    display:flex;
    gap:12px;
    }

    button{
    background:#f8f9fa;
    border:1px solid #f8f9fa;
    padding:10px 16px;
    border-radius:4px;
    cursor:pointer;
    }

    button:hover{
    border:1px solid #dadce0;
    }

    /* FOOTER */

    footer{
    background:#f2f2f2;
    font-size:14px;
    }

    .footer-top{
    padding:12px 30px;
    border-bottom:1px solid #ddd;
    }

    .footer-bottom{
    display:flex;
    justify-content:space-between;
    padding:12px 30px;
    flex-wrap:wrap;
    }

    footer a{
    margin-right:15px;
    text-decoration:none;
    color:#202124;
    }

</style>
</head>

<body>
    <!-- Header -->
    <header>
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <span class="material-symbols-outlined apps">apps</span>
        <img class="profile" src="https://i.pravatar.cc/150">
    </header>

   <!-- Main -->
    <div class="main">

        <div class="logo"></div>

        <form action="https://www.google.com/search" method="GET">

            <div class="search">

                <span class="material-symbols-outlined">search</span>

                <input type="text" autofocus name="q" placeholder="Search Google or type a URL">

                <div class="icons">
                    <span class="material-symbols-outlined">mic</span>
                    <span class="material-symbols-outlined">photo_camera</span>
                </div>

            </div>

            <div class="buttons">
                <button type="submit">Google Search</button>
                <button type="button">I'm Feeling Lucky</button>
            </div>

        </form>

    </div>

   
   <!-- Footer -->
    <footer>

        <div class="footer-top">
        Bangladesh
        </div>

        <div class="footer-bottom">

        <div>
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
            <a href="#">How Search works</a>
        </div>

        <div>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>

        </div>

    </footer>

</body>
</html>
